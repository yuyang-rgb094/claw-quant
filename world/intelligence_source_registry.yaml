# ─────────────────────────────────────────────────────────────────────────
# Personnel Surveillance: Political Intelligence as Leading Indicator
# Personnel changes activate watch mode, do NOT directly trigger Tier 3
# ─────────────────────────────────────────────────────────────────────────

personnel_surveillance:
  description: >
    Political intelligence (WHO is in power) is a leading indicator of
    policy intelligence (WHAT policies emerge). A personnel change does NOT
    directly trigger Tier 3 — it activates watch mode for the relevant
    monitoring points, increasing event-driven scan sensitivity.

  watch_mode_behavior:
    frequency_increase: "Daily scan instead of continuous-monitoring threshold"
    keyword_expansion: "Include new official's known policy preferences, past speeches, institutional affiliations"
    expiry: "90 days OR first Tier S/A formal policy announcement from new official, whichever comes first"

  tracked_positions:
    - position: "Fed Chair"
      authority: tier_s
      on_change: "Governance paradigm review"
      affected_monitoring_points:
        - mp_3_6_fomc_paradigm
      watch_mode_keywords:
        - "new Fed chair"
        - "Powell successor"
        - "Fed chair nomination"

    - position: "CSRC Chair"
      authority: tier_s
      on_change: "Regulatory framework review"
      affected_monitoring_points:
        - mp_3_4_regulatory_framework
      watch_mode_keywords:
        - "证监会主席"
        - "CSRC chair"
        - "new securities regulator"

    - position: "PBoC Governor"
      authority: tier_s
      on_change: "Transmission pathway review"
      affected_monitoring_points:
        - mp_3_2_pboc_transmission
      watch_mode_keywords:
        - "央行行长"
        - "PBoC governor"
        - "central bank governor China"

    - position: "US Treasury Secretary"
      authority: tier_s
      on_change: "Geopolitical + trade policy review"
      affected_monitoring_points:
        - mp_3_5_geopolitical
        - mp_3_7_trade_settlement
      watch_mode_keywords:
        - "Treasury Secretary"
        - "sanctions policy"
        - "currency report"

    - position: "USTR Representative"
      authority: tier_a
      on_change: "Trade policy review"
      affected_monitoring_points:
        - mp_3_5_geopolitical
        - mp_3_7_trade_settlement
      watch_mode_keywords:
        - "USTR"
        - "Trade Representative"
        - "Section 301"

    - position: "FSDC Chair"
      authority: tier_s
      on_change: "Cross-regulatory coordination review"
      affected_monitoring_points:
        - mp_3_4_regulatory_framework
      watch_mode_keywords:
        - "金融委主任"
        - "FSDC chair"
        - "financial stability"

# ─────────────────────────────────────────────────────────────────────────
# Chinese Policy Intelligence: Multi-Layer Signal System
# ─────────────────────────────────────────────────────────────────────────

chinese_policy_intelligence:
  description: >
    Chinese policy direction is signaled through layers with different lead
    times. The retrieval system must track all four layers, with Layer 1-2
    serving as early warning that increases event-driven scan sensitivity.

  multi_layer_signal_system:
    - layer: 1
      name: "最高领导讲话 (Leadership speeches)"
      source_type: "Politburo meetings, major conferences, Central Economic Work Conference"
      authority_tier: tier_s
      lead_time: "6-12 months"
      keywords:
        - "政治局会议"
        - "中央经济工作会议"
        - "习近平讲话"
      action: "Record as [STRATEGIC_SIGNAL], activate watch mode for affected monitoring points"
      routing: log_only

    - layer: 2
      name: "党报社论 (State media editorials)"
      source_type: "People's Daily front-page editorials, Xinhua commentaries, Qiushi articles"
      authority_tier: tier_c
      lead_time: "1-3 months"
      keywords:
        - "人民日报评论员"
        - "新华社评论"
        - "求是"
      action: "Record as [POLICY_PREVIEW], increase event-driven scan sensitivity"
      routing: log_only
      note: >
        These are the Chinese equivalent of 'trial balloon' — they preview
        policy direction before formal announcement. High signal value despite
        Tier C authority, because they are state-directed.

    - layer: 3
      name: "正式文件 (Formal documents)"
      source_type: "State Council executive meetings, ministry documents, joint issuances"
      authority_tier: tier_s
      lead_time: "Immediate"
      keywords:
        - "国务院常务会议"
        - "部委文件"
        - "联合发文"
      action: "Process through AI classification pipeline"
      routing: tier2_or_tier3

    - layer: 4
      name: "窗口指导/实施细则 (Window guidance / Implementation rules)"
      source_type: "Window guidance reported by media, implementation notices, detailed rules"
      authority_tier: tier_c
      lead_time: "Immediate"
      keywords:
        - "窗口指导"
        - "实施细则"
        - "监管要求"
      action: "Record as [IMPLEMENTATION_SIGNAL]"
      routing: log_only

  special_sources:
    - source: scio
      authority_tier: tier_a
      name: "国务院新闻办公室 (State Council Information Office)"
      frequency: "event-driven (policy briefings)"
      keywords:
        - "政策吹风"
        - "新闻发布会"
        - "白皮书"
      note: "Regular policy briefings where formal policy is communicated. Tier A authority."

    - source: fsdc
      authority_tier: tier_s
      name: "金融委 (Financial Stability and Development Committee)"
      frequency: "event-driven"
      keywords:
        - "金融委"
        - "financial stability"
        - "cross-regulatory"
      note: >
        Cross-regulatory coordination body. Statements signal coordination
        across CSRC, CBIRC, and PBoC. High importance for Tier 3.4.

    - source: ndrc
      authority_tier: tier_a
      name: "发改委 (National Development and Reform Commission)"
      frequency: "event-driven"
      keywords:
        - "发改委"
        - "产业政策"
        - "投资项目"
      note: >
        Macro-economic planning body. Announcements on industrial policy,
        investment approval, and project pipelines are leading indicators
        for regulatory framework changes.

# ─────────────────────────────────────────────────────────────────────────
# Noise Filtering Mechanisms
# ─────────────────────────────────────────────────────────────────────────

noise_filtering:
  source_authority_gate:
    rule: >
      Only Tier S/A sources can directly trigger Tier 3.
      Tier C/D sources must first pass through AI classification, which
      checks for corroboration from Tier S/A sources before escalating.
      A Reuters headline alone NEVER triggers Tier 3 — it must be followed
      by an official confirmation within a reasonable window (72 hours).

  change_level_gate:
    rule: >
      Only 'legislative' and 'regulatory' level changes can trigger Tier 3.
      'verbal' level changes (speeches, comments, editorials) are always
      logged as [SIGNAL] with no action triggered.
      This prevents leadership rhetoric from causing framework re-evaluation
      before formal policy follows.

  cooldown_period:
    duration_days: 30
    rule: >
      After a Tier 3 trigger fires for a monitoring point, a 30-day cooldown
      prevents re-triggering for the same point unless a HIGHER-LEVEL change
      is detected (e.g., if 'regulatory' triggered Tier 3, only a subsequent
      'legislative' change can re-trigger during cooldown).
      This prevents the same structural change from being processed multiple
      times as it cascades through media coverage.

  keyword_specificity_rule:
    rule: >
      Keywords must be specific enough to avoid false positives.
      Broad keywords ('Fed', '央行', 'stock market', 'A股') are excluded.
      Specific phrases are required: 'forward guidance abandoned',
      'SFISF扩容', '证券法修订', '资本账户开放'.
      The keyword registry is reviewed quarterly for precision.

# ─────────────────────────────────────────────────────────────────────────
# Retrieval Workflow
# ─────────────────────────────────────────────────────────────────────────

retrieval_workflow:
  step_1_scheduled_polling:
    description: "Agent polls scheduled sources on their publication frequency"
    implementation: "Cron-based recurring tasks"
    action: "Check for new publications since last poll"
    on_new_publication: "Route to Step 3 (AI Classification)"
    frequency_matrix:
      daily: ["HKEX Stock Connect data", "UST yields", "VIX", "USD index"]
      weekly: ["State Council executive meeting summary", "Fed H.4.1 balance sheet"]
      monthly: ["PBoC MLF/LPR", "NBS CPI/PPI", "BLS CPI/PCE", "SWIFT RMB share"]
      quarterly: ["SAFE Balance of Payments", "PBoC Monetary Policy Report", "Contribution weight regression"]
      semi_annual: ["PBoC RMB Internationalization Report", "Fed Monetary Policy Report"]
      every_6_weeks: ["FOMC statement"]

  step_2_event_driven_scan:
    description: "Agent monitors event-driven sources for keyword matches"
    implementation: "RSS feeds + web scraping with keyword monitoring"
    action: "If keyword match found, extract full context including surrounding text"
    on_match: "Route to Step 3 (AI Classification)"
    corroboration_window: 72_hours
    note: >
      If a Tier C source reports a structural change, the system waits up to
      72 hours for corroboration from a Tier S/A source before escalating.

  step_3_ai_classification:
    description: "AI classifies retrieved content along five dimensions"
    dimensions:
      - source_authority: "tier_s / tier_a / tier_b / tier_c / tier_d"
      - change_level: "legislative / regulatory / verbal / data"
      - monitoring_point: "mp_3_1 through mp_3_7"
      - routing: "tier1 / tier2 / tier3 / log_only"
      - urgency: "immediate / next_cycle / log_only"
    implementation: "DeepSeek with structured classification prompt"
    constraint: >
      AI does NOT decide the routing rules — those are deterministic.
      AI's role is to determine the VALUES of the five classification
      dimensions. Routing is applied mechanically based on those values.

  step_4_routing:
    description: "Classified intelligence routes to appropriate processing tier"
    routing_rules:
      - condition: "tier_b source + data release"
        route: "tier1_data_refresh"
        processing: "Automated field update (ADR-012 Tier 1)"

      - condition: "tier_a source + regulatory change"
        route: "tier2_event_driven"
        processing: "Semi-automated re-evaluation (ADR-012 Tier 2)"

      - condition: "tier_s source + legislative change"
        route: "tier3_regime_surveillance"
        processing: "Bidirectional Feynman protocol (ADR-012 Tier 3)"

      - condition: "tier_c/d source + breaking news"
        route: "ai_classification_first"
        processing: "AI determines if escalation warranted; requires Tier S/A corroboration within 72 hours"

      - condition: "any source + verbal level change"
        route: "log_only"
        processing: "Record as [SIGNAL], no action triggered"

      - condition: "mp_3_6 + fomc_statement_diff structural/deletion"
        route: "tier3_regime_surveillance"
        processing: "FOMC statement diff analysis → Tier 3 Feynman → governance_paradigm.md update"
